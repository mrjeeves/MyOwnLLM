name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev
        # `cmake` is no longer in the dep list — whisper-rs was the only
        # consumer (it built whisper.cpp from source) and the new ASR
        # stack uses the `ort` crate with a dynamically-loaded
        # onnxruntime instead. The LunarG Vulkan SDK install steps
        # (Linux x86_64 + Windows) that used to live here are gone for
        # the same reason: only whisper-rs's Vulkan feature wanted them.

      # `src-tauri/rust-toolchain.toml` pins channel 1.88.0 + the
      # rustfmt/clippy components, so `rustup show` inside that
      # directory installs the right toolchain on demand. This
      # replaces the previous `dtolnay/rust-toolchain@1.88.0` +
      # macOS-only belt-and-braces dance, which silently no-op'd the
      # `components:` install on the macOS-14 ARM runner and made
      # `cargo fmt --check` red on every PR with a real-but-imaginary
      # "Rust formatting" diff (#152, #153). One install path, one
      # source of truth.
      - name: Install Rust toolchain
        working-directory: src-tauri
        run: rustup show active-toolchain || rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # No `version:` — pnpm/action-setup@v4 then reads the
      # `packageManager` field from package.json so CI uses the exact
      # same pnpm as `just dev` on a contributor's machine. Pinning
      # a different `version:` here would cause pnpm 10+ to refuse to
      # run with "current pnpm version does not match packageManager".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Frontend type-check
        run: pnpm check

      # `cargo` from inside `src-tauri/` goes through the rustup proxy
      # and respects the pinned channel in `rust-toolchain.toml`, so
      # bare `cargo …` is enough — no `rustup run` prefix needed. The
      # macOS-14 `cargo → rustup-init` symlink case the old prefix
      # worked around is solved by `working-directory: src-tauri` (the
      # rustup proxy reads the toolchain file and dispatches to the
      # right binary) plus the explicit `rustup show` step above.
      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy --all-targets

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --no-fail-fast
