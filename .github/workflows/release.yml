name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  bundles:
    name: Tauri bundles (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux builds are pinned to Ubuntu 22.04 (glibc 2.35) — not ubuntu-latest —
          # so the resulting binaries run on Ubuntu 22.04+, Debian 12, and other
          # distros still on glibc 2.35/2.36/2.38. Building on 24.04 links against
          # glibc 2.39 and breaks anything older with "GLIBC_2.39 not found".
          - { name: linux-x86_64,   os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu }
          - { name: linux-aarch64,  os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
          - { name: macos-aarch64,  os: macos-14,         target: aarch64-apple-darwin }
          - { name: macos-x86_64,   os: macos-14,         target: x86_64-apple-darwin }
          - { name: windows-x86_64, os: windows-latest,   target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      # Guard against the "tag says v0.1.5, binary reports 0.1.2" trap.
      # The binary embeds CARGO_PKG_VERSION at compile time, so if the
      # manifests don't match the tag every install will misreport its
      # version and self-update will keep saying "update available."
      # src-tauri/Cargo.toml is the single source of truth; tauri.conf.json
      # has no version field (Tauri 2 falls back to Cargo.toml). package.json
      # is kept in sync by `just release` / scripts/bump-version.sh.
      - name: Verify tag matches manifest versions
        shell: bash
        run: |
          set -e
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${TAG#v}"
          fail() { echo "::error::$*"; exit 1; }
          got_cargo=$(awk -F\" '/^version = / {print $2; exit}' src-tauri/Cargo.toml)
          got_pkg=$(node -e "console.log(require('./package.json').version)")
          [[ "$got_cargo" == "$EXPECTED" ]] || fail "src-tauri/Cargo.toml version is $got_cargo, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          [[ "$got_pkg"   == "$EXPECTED" ]] || fail "package.json version is $got_pkg, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          echo "Manifest versions match tag $TAG ($EXPECTED)."

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev xdg-utils libasound2-dev cmake

      # Same Vulkan SDK install pattern as the CI workflow. Linux uses the
      # official LunarG apt repo (apt's libvulkan-dev is missing glslc);
      # Windows uses the humbletim action (it sets VULKAN_SDK which
      # whisper-rs-sys's build script requires). arm64 Linux stays
      # CPU-only — Cargo.toml gates Vulkan off for that target.
      - name: Install Vulkan SDK (Linux x86_64)
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/keyrings/lunarg-vulkan.asc > /dev/null
          UBU_CODENAME=$(. /etc/os-release && echo "$UBUNTU_CODENAME")
          echo "deb [signed-by=/etc/apt/keyrings/lunarg-vulkan.asc] https://packages.lunarg.com/vulkan ${UBU_CODENAME} main" \
            | sudo tee /etc/apt/sources.list.d/lunarg-vulkan.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Scope the cache by the specific runner image. The default key
          # only includes runner.os ("Linux"), so ubuntu-22.04 and
          # ubuntu-latest (24.04) collide and a job restores a target/
          # built against a different sysroot/glibc — yielding spurious
          # "can't find crate for tauri" errors on the first build after
          # changing runners (#159 fallout). Including matrix.platform.os
          # gives each runner image its own cache namespace.
          key: ${{ matrix.platform.os }}

      # No `version:` — pnpm/action-setup@v4 reads the version from
      # package.json's `packageManager` field. Pinning a different
      # `version:` here causes pnpm 10+ to refuse to run with
      # ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm build

      - name: Verify frontend bundle
        shell: bash
        run: |
          set -e
          if [[ ! -f dist/index.html ]]; then
            echo "::error::dist/index.html missing — vite build failed silently"
            exit 1
          fi
          if grep -q '/src/main.ts' dist/index.html; then
            echo "::error::dist/index.html still references /src/main.ts — vite did not rewrite the entry"
            cat dist/index.html
            exit 1
          fi
          if [[ ! -d dist/assets ]] || [[ -z "$(ls -A dist/assets 2>/dev/null)" ]]; then
            echo "::error::dist/assets is empty — no compiled JS/CSS"
            ls -la dist/
            exit 1
          fi
          # Guard against the SSR-runtime regression: if Svelte's server build
          # leaks into the client bundle, `mount()` throws and the WebView is
          # blank. Detect by looking for the server-only error name.
          if grep -q 'lifecycle_function_unavailable' dist/assets/*.js; then
            echo "::error::dist bundle contains Svelte SSR runtime — mount() would throw in the browser. Check vite.config.ts resolve.conditions."
            exit 1
          fi
          echo "dist/ OK:"
          ls -la dist/ dist/assets/

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: ${{ inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.platform.target }}

      - name: Package portable binary
        shell: bash
        run: |
          set -e
          BIN=src-tauri/target/${{ matrix.platform.target }}/release/myownllm
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="myownllm-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/myownllm.exe"
            # chdir before hashing so the `.sha256` sidecar records just the
            # basename — matching how the GitHub asset is uploaded. Hashing
            # `dist-bin/<file>` from the repo root would bake `dist-bin/`
            # into the recorded filename and break self-update verification.
            (cd dist-bin && 7z a "${NAME}.zip" myownllm.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
          else
            cp "$BIN" "dist-bin/myownllm"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin myownllm
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-bin/myownllm-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  installer-asset:
    name: Upload installers
    needs: bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            scripts/install.sh
            scripts/install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
